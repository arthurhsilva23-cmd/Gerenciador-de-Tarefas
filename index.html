<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Gerenciador para tarefas de rotina " />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="Gerenciador, tarefas, organização, tasks" />
    <meta name="author" content="Arthur.H" />

    <title>Gerenciador Tarefas</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <h1>Gerenciador de Tarefas</h1>

      <form id="Task-form">
        <label nome="titulo">Titulo</label>
        <input type="text" placeholder="Digite uma tarefa" required />
        <label nome="titulo">Descrição</label>
        <input type="text" placeholder="Descrição de tarefas" />
        <button>Adicionar</button>
      </form>

      <ul id="Task-list"></ul>
    </div>
  </body>
</html>
